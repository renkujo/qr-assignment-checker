services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      POCKETBASE_URL: http://pocketbase:8090
      PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://localhost:8090}
    depends_on:
      pocketbase:
        condition: service_healthy
    expose:
      - '3000'
    restart: unless-stopped

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
      args:
        PB_VERSION: ${PB_VERSION:-0.39.5}
    volumes:
      - pocketbase_data:/pb/pb_data
    expose:
      - '8090'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8090/api/health']
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pocketbase_data:
